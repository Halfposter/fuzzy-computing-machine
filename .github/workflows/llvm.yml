name: Build Static Clang Toolchain

on:
  workflow_dispatch:

jobs:
  build-clang:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout LLVM Project
        uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          ref: release/22.x 
          fetch-depth: 1 

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential

      - name: Configure LLVM Build
        run: |
          mkdir build
          cd build
          
          cmake -G Ninja ../llvm \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_BUILD_STATIC=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLVM_LINK_LLVM_DYLIB=OFF \
            -DLLVM_TARGETS_TO_BUILD="X86" \
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++" \
            -DLLVM_PARALLEL_LINK_JOBS=1

      - name: Compile Clang and LLD
        run: |
          cd build
          ninja clang lld

      - name: Strip Binaries to Reduce Size
        run: |
          cd build/bin
          strip clang* lld* ld.lld* || true

      - name: Upload Static Toolchain Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: static-clang-linux-x86_64
          path: |
            build/bin/clang
            build/bin/clang++
            build/bin/lld
            build/bin/ld.lld
            build/lib/clang/*/include
          retention-days: 7
